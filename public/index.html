<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ACU 计算器</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background: #0b0b0b;
      color: #fff;
    }

    .page {
      max-width: 760px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 8px;
    }

    .sub {
      color: #aaa;
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .card {
      background: #151515;
      border: 1px solid #2a2a2a;
      border-radius: 18px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .formula {
      background: #101010;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 14px;
      color: #cfcfcf;
      margin-bottom: 20px;
      text-align: center;
    }

    .upload {
      border: 2px dashed #444;
      border-radius: 16px;
      padding: 30px;
      text-align: center;
      cursor: pointer;
      color: #aaa;
    }

    .upload:hover {
      border-color: #e8ff47;
      color: #fff;
    }

    input[type="file"] {
      display: none;
    }

    .preview {
      margin-top: 20px;
      display: none;
    }

    .preview img {
      max-width: 100%;
      border-radius: 12px;
      border: 1px solid #333;
    }

    .fields {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    label {
      display: block;
      color: #999;
      margin-bottom: 6px;
      font-size: 14px;
    }

    input[type="number"] {
      width: 100%;
      box-sizing: border-box;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #333;
      background: #0f0f0f;
      color: #fff;
      font-size: 20px;
    }

    button {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      background: #e8ff47;
      color: #000;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    .result {
      text-align: center;
      display: none;
    }

    .result .num {
      font-size: 72px;
      font-weight: bold;
      color: #e8ff47;
      margin: 10px 0;
    }

    .status {
      display: none;
      color: #e8ff47;
      margin-top: 14px;
      text-align: center;
    }

    .error {
      display: none;
      color: #ff7777;
      background: rgba(255, 80, 80, 0.1);
      border: 1px solid rgba(255, 80, 80, 0.25);
      border-radius: 12px;
      padding: 12px;
      margin-top: 14px;
      line-height: 1.5;
    }

    .tip {
      color: #888;
      font-size: 13px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>ACU 计算器</h1>
    <div class="sub">
      上传快手「单场直播分析」截图，自动识别观众人数、人均看播时长、直播时长，并计算 ACU。
    </div>

    <div class="formula">
      ACU = 观众人数 × 人均看播时长 ÷ 直播时长
    </div>

    <div class="card">
      <label for="file">
        <div class="upload">
          点击上传截图<br />
          <span style="font-size: 13px;">建议上传完整的「单场直播分析」页面截图</span>
        </div>
      </label>
      <input id="file" type="file" accept="image/*" />

      <div class="preview" id="preview">
        <img id="previewImg" />
      </div>

      <div class="status" id="status">正在识别，请稍等...</div>

      <div class="error" id="error"></div>
    </div>

    <div class="card">
      <div class="fields">
        <div>
          <label>观众人数</label>
          <input id="viewers" type="number" placeholder="例如 1935" />
        </div>

        <div>
          <label>人均看播时长（分钟）</label>
          <input id="avgWatch" type="number" step="0.01" placeholder="例如 0.1" />
        </div>

        <div>
          <label>直播时长（分钟）</label>
          <input id="duration" type="number" step="0.001" placeholder="例如 28.917" />
        </div>
      </div>

      <div style="height: 20px;"></div>

      <button onclick="calculateACU()">计算 ACU</button>

      <p class="tip">
        如果识别结果不准，可以手动修改上面的数字，再点击计算。
      </p>
    </div>

    <div class="card result" id="result">
      <div>ACU 结果</div>
      <div class="num" id="acuResult">--</div>
      <div id="formulaText"></div>
    </div>
  </div>

  <script>
    const fileInput = document.getElementById("file");
    const preview = document.getElementById("preview");
    const previewImg = document.getElementById("previewImg");
    const statusBox = document.getElementById("status");
    const errorBox = document.getElementById("error");

    fileInput.addEventListener("change", async function () {
      const file = fileInput.files[0];
      if (!file) return;

      previewImg.src = URL.createObjectURL(file);
      preview.style.display = "block";

      errorBox.style.display = "none";
      statusBox.style.display = "block";
      statusBox.textContent = "正在上传并识别截图，请稍等...";

      const formData = new FormData();
      formData.append("image", file);

      try {
        const res = await fetch("/api/recognize-acu", {
          method: "POST",
          body: formData,
        });

        const data = await res.json();

        statusBox.style.display = "none";

        if (!data.success) {
          throw new Error(data.error || "识别失败");
        }

        document.getElementById("viewers").value = data.viewers ?? "";
        document.getElementById("avgWatch").value = data.avgWatchMinutes ?? "";
        document.getElementById("duration").value = data.durationMinutes ?? "";

        if (data.viewers && data.avgWatchMinutes && data.durationMinutes) {
          calculateACU();
        } else {
          showError("部分字段没有识别出来，请手动补充后点击计算。");
        }
      } catch (err) {
        statusBox.style.display = "none";
        showError("识别失败：" + err.message);
      }
    });

    function calculateACU() {
      const viewers = Number(document.getElementById("viewers").value);
      const avgWatch = Number(document.getElementById("avgWatch").value);
      const duration = Number(document.getElementById("duration").value);

      if (!viewers || !avgWatch || !duration) {
        showError("请填写观众人数、人均看播时长、直播时长。");
        return;
      }

      const acu = viewers * avgWatch / duration;

      document.getElementById("result").style.display = "block";
      document.getElementById("acuResult").textContent = acu.toFixed(2);
      document.getElementById("formulaText").textContent =
        `${viewers} × ${avgWatch} ÷ ${duration} = ${acu.toFixed(2)}`;
    }

    function showError(message) {
      errorBox.textContent = message;
      errorBox.style.display = "block";
    }
  </script>
</body>
</html>
